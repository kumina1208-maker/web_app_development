{% extends "base.html" %}

{% block title %}編輯食譜 - {{ recipe.title }}{% endblock %}

{% block content %}
<h1 class="mb-4">✏️ 編輯食譜</h1>

<form method="POST" action="{{ url_for('recipe.edit_recipe_submit', id=recipe.id) }}">
    <!-- 基本資訊 -->
    <div class="card mb-4">
        <div class="card-header">基本資訊</div>
        <div class="card-body">
            <div class="mb-3">
                <label for="title" class="form-label">食譜名稱 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="title" name="title" value="{{ recipe.title }}" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">簡介</label>
                <textarea class="form-control" id="description" name="description" rows="2">{{ recipe.description or '' }}</textarea>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="servings" class="form-label">份數 <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="servings" name="servings" min="1" value="{{ recipe.servings }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="prep_time_min" class="form-label">備料時間（分鐘）</label>
                    <input type="number" class="form-control" id="prep_time_min" name="prep_time_min" min="0" value="{{ recipe.prep_time_min or '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="cook_time_min" class="form-label">烹飪時間（分鐘）</label>
                    <input type="number" class="form-control" id="cook_time_min" name="cook_time_min" min="0" value="{{ recipe.cook_time_min or '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label for="tags" class="form-label">標籤（以逗號分隔）</label>
                <input type="text" class="form-control" id="tags" name="tags" value="{{ recipe.tags or '' }}">
            </div>
        </div>
    </div>

    <!-- 食材清單 -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            🥬 食材清單
            <button type="button" class="btn btn-sm btn-outline-success" onclick="addIngredientRow()">+ 新增食材</button>
        </div>
        <div class="card-body" id="ingredients-section">
            {% for ing in ingredients %}
            <div class="ingredient-row row g-2 mb-2 align-items-end">
                <div class="col-md-3">
                    <input type="text" class="form-control form-control-sm" name="ingredient_name[]" value="{{ ing.name }}" required>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control form-control-sm" name="ingredient_quantity[]" value="{{ ing.quantity }}" step="0.1" required>
                </div>
                <div class="col-md-2">
                    <input type="text" class="form-control form-control-sm" name="ingredient_unit[]" value="{{ ing.unit }}" required>
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control form-control-sm" name="ingredient_notes[]" value="{{ ing.notes or '' }}">
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.ingredient-row').remove()">✕</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- 烹飪步驟 -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            📋 烹飪步驟
            <button type="button" class="btn btn-sm btn-outline-success" onclick="addStepRow()">+ 新增步驟</button>
        </div>
        <div class="card-body" id="steps-section">
            {% for step in steps %}
            <div class="step-row row g-2 mb-2 align-items-start">
                <div class="col-md-1 pt-2 text-center fw-bold">{{ loop.index }}.</div>
                <div class="col-md-7">
                    <textarea class="form-control form-control-sm" name="step_instruction[]" rows="2" required>{{ step.instruction }}</textarea>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control form-control-sm" name="step_timer[]" value="{{ step.timer_seconds or '' }}" min="0">
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.step-row').remove()">✕</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-lg">💾 儲存變更</button>
        <a href="{{ url_for('recipe.recipe_detail', id=recipe.id) }}" class="btn btn-outline-secondary btn-lg">取消</a>
    </div>
</form>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/recipe_form.js') }}"></script>
{% endblock %}
