{% extends "base.html" %}

{% block title %}新增食譜 - 食譜收藏系統{% endblock %}

{% block content %}
<h1 class="mb-4">➕ 新增食譜</h1>

<!-- URL 抓取區塊 -->
<div class="card mb-4 border-info">
    <div class="card-header bg-info text-white">📎 從網址匯入食譜</div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('recipe.scrape_recipe') }}">
            <div class="input-group">
                <input type="url" name="url" class="form-control" placeholder="貼上食譜網址（如愛料理）...">
                <button type="submit" class="btn btn-info text-white">抓取</button>
            </div>
        </form>
    </div>
</div>

<hr class="my-4">

<!-- 手動新增表單 -->
<h4 class="mb-3">✏️ 手動新增</h4>
<form method="POST" action="{{ url_for('recipe.new_recipe_submit') }}">

    <!-- 基本資訊 -->
    <div class="card mb-4">
        <div class="card-header">基本資訊</div>
        <div class="card-body">
            <div class="mb-3">
                <label for="title" class="form-label">食譜名稱 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="title" name="title" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">簡介</label>
                <textarea class="form-control" id="description" name="description" rows="2"></textarea>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="servings" class="form-label">份數 <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="servings" name="servings" min="1" value="2" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="prep_time_min" class="form-label">備料時間（分鐘）</label>
                    <input type="number" class="form-control" id="prep_time_min" name="prep_time_min" min="0">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="cook_time_min" class="form-label">烹飪時間（分鐘）</label>
                    <input type="number" class="form-control" id="cook_time_min" name="cook_time_min" min="0">
                </div>
            </div>
            <div class="mb-3">
                <label for="tags" class="form-label">標籤（以逗號分隔）</label>
                <input type="text" class="form-control" id="tags" name="tags" placeholder="例如：台式, 快炒, 省時">
            </div>
        </div>
    </div>

    <!-- 食材清單 -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            🥬 食材清單
            <button type="button" class="btn btn-sm btn-outline-success" onclick="addIngredientRow()">+ 新增食材</button>
        </div>
        <div class="card-body" id="ingredients-section">
            <div class="ingredient-row row g-2 mb-2 align-items-end">
                <div class="col-md-3">
                    <input type="text" class="form-control form-control-sm" name="ingredient_name[]" placeholder="食材名稱" required>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control form-control-sm" name="ingredient_quantity[]" placeholder="數量" step="0.1" required>
                </div>
                <div class="col-md-2">
                    <input type="text" class="form-control form-control-sm" name="ingredient_unit[]" placeholder="單位" required>
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control form-control-sm" name="ingredient_notes[]" placeholder="備註">
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.ingredient-row').remove()">✕</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 烹飪步驟 -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            📋 烹飪步驟
            <button type="button" class="btn btn-sm btn-outline-success" onclick="addStepRow()">+ 新增步驟</button>
        </div>
        <div class="card-body" id="steps-section">
            <div class="step-row row g-2 mb-2 align-items-start">
                <div class="col-md-1 pt-2 text-center fw-bold">1.</div>
                <div class="col-md-7">
                    <textarea class="form-control form-control-sm" name="step_instruction[]" rows="2" placeholder="步驟說明" required></textarea>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control form-control-sm" name="step_timer[]" placeholder="計時（秒）" min="0">
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.step-row').remove()">✕</button>
                </div>
            </div>
        </div>
    </div>

    <button type="submit" class="btn btn-primary btn-lg">💾 儲存食譜</button>
</form>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/recipe_form.js') }}"></script>
{% endblock %}
