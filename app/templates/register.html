{% extends "base.html" %}

{% block title %}註冊 - 食譜收藏系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4">📝 建立帳號</h2>
                <form method="POST" action="{{ url_for('main.register_submit') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">使用者名稱</label>
                        <input type="text" class="form-control" id="username" name="username" required
                               value="{{ request.form.get('username', '') }}">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">電子郵件</label>
                        <input type="email" class="form-control" id="email" name="email" required
                               value="{{ request.form.get('email', '') }}">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密碼</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                        <div class="form-text">密碼至少 4 個字元</div>
                    </div>
                    <div class="mb-3">
                        <label for="password_confirm" class="form-label">確認密碼</label>
                        <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">註冊</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    已有帳號？<a href="{{ url_for('main.login_page') }}">前往登入</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
